---
- name: Serverlarga Nginx o'rnatish testi
  hosts: all
  become: yes
  tasks:
    - name: Paketlar ro'yxatini yangilash (apt update)
      apt:
        update_cache: yes

    - name: Nginx o'rnatish
      apt:
        name: nginx
        state: present

    - name: Nginx xizmatini yoqish
      service:
        name: nginx
        state: started
        enabled: yes

- name: Install tools and nginx
  hosts: all
  become: yes

  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes

    - name: Install packages
      apt:
        name:
          - curl
          - nginx
          - unzip
        state: present

    - name: Ensure nginx is running
      service:
        name: nginx
        state: started
        enabled: yes

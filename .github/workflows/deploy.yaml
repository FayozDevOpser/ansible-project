name: Deploy via Bastion

on:
  push:
    branches:
      - main
      - test
      - preprod

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run playbook via Bastion
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.BASTION_IP }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /root/ansible-project || exit 1
            git pull origin main
            apt update
            apt install -y ansible
            ansible all -i inventory/host.ini -m ping
            ansible-playbook -i inventory/host.ini playbooks/site.yaml
